"""
Formats a date in the desired format. Can be applied to all fields, only changes output of DateTime fields.
"""
directive @formatDateTime(
  """
  The format to use. Can be `short`, `medium`, `long`, `full`, an [ICU date
  format](http://userguide.icu-project.org/formatparse/datetime), or a [PHP date
  format](https://www.php.net/manual/en/function.date.php). Defaults to the
  [Atom date time
  """
  format: String = "Y-m-d\\TH:i:sP"

  """
  The full name of the timezone (e.g., America/New_York). Defaults to UTC if no timezone set on the field.
  """
  timezone: String = "UTC"

  """The locale to use when formatting the date. (E.g., en-US)"""
  locale: String

  """
  Whether the time zone abbreviation should be appended to the formatted time.
  """
  withTimeZone: Boolean = false
) on FIELD

"""Parses the passed field value as Markdown."""
directive @markdown(
  """
  The “flavor” of Markdown the input should be interpreted with. Accepts the
  same flavor names as `CraftCms\Cms\Support\Facades\Markdown::parse()`.
  """
  flavor: String = null

  """Whether to only parse inline elements, omitting any `<p>` tags."""
  inlineOnly: Boolean = false
) on FIELD

"""
Formats a money object to the desired format. It can be applied to any fields, but only changes a Money field.
"""
directive @money(
  """
  This specifies the format to output. This can be `amount`, `decimal`, `number`, or `string`. It defaults to the `string`.
  """
  format: String = "string"

  """
  The locale to use when formatting the money value. (e.g. `en_US`). This
  argument is only valid with `number` and `string` formats.
  """
  locale: String
) on FIELD

"""Strips HTML tags from the field value."""
directive @stripTags(
  """List of allowed tag names."""
  allowed: [String] = []
) on FIELD

"""Trims leading and trailing whitespace from the field value."""
directive @trim on FIELD

