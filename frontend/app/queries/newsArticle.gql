#import './blocks/imageCarousel.gql'

query NewsArticle($slug: [String]) {
    entry(section: "news", slug: $slug) {
        ... on newsArticle_Entry {
            id
            title
            slug
            dateCreated
            summary
            heroImage {
                thumb: url(width: 400, height: 400, mode: "crop")
                full: url(width: 1200, height: 630, mode: "crop")
                alt
                width
                height
            }
            categories {
                ... on newsCategory_Entry {
                    id
                    title
                    slug
                }
            }
            dynamicSection {
                ... on EntryInterface {
                    id
                    __typename
                }
                ...ImageCarouselBlock
            }
        }
    }
}
